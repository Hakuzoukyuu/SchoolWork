<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('住宿管理列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>学生学号：</label>
                                <input type="text" name="studentId"/>
                            </li>
                            <li>
                                <label>宿舍楼号：</label>
                                <input type="text" name="buildingNo"/>
                            </li>
                            <li>
                                <label>楼层：</label>
                                <input type="text" name="floor"/>
                            </li>
                            <li>
                                <label>门牌号：</label>
                                <input type="text" name="roomNo"/>
                            </li>
                            <li>
                                <label>床位号：</label>
                                <input type="text" name="bedNo"/>
                            </li>
                            <li>
                                <label>入住日期：</label>
                                <input type="text" class="time-input" placeholder="请选择入住日期" name="checkInDate"/>
                            </li>
                            <li>
                                <label>退宿日期：</label>
                                <input type="text" class="time-input" placeholder="请选择退宿日期" name="checkOutDate"/>
                            </li>
                            <li>
                                <label>：</label>
                                <input type="text" class="time-input" placeholder="请选择" name="createdAt"/>
                            </li>
                            <li>
                                <label>：</label>
                                <input type="text" class="time-input" placeholder="请选择" name="updatedAt"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="Accomdation:accommodation:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="Accomdation:accommodation:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="Accomdation:accommodation:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="Accomdation:accommodation:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('Accomdation:accommodation:edit')}]];
        var removeFlag = [[${@permission.hasPermi('Accomdation:accommodation:remove')}]];
        var prefix = ctx + "Accomdation/accommodation";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "住宿管理",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'accommodationId',
                    title: '住宿记录ID',
                    visible: false
                },
                {
                    field: 'studentId',
                    title: '学生学号'
                },
                {
                    field: 'buildingNo',
                    title: '宿舍楼号'
                },
                {
                    field: 'floor',
                    title: '楼层'
                },
                {
                    field: 'roomNo',
                    title: '门牌号'
                },
                {
                    field: 'bedNo',
                    title: '床位号'
                },
                {
                    field: 'checkInDate',
                    title: '入住日期'
                },
                {
                    field: 'checkOutDate',
                    title: '退宿日期'
                },
                {
                    field: 'status',
                    title: '状态'
                },
                {
                    field: 'createdAt',
                    title: ''
                },
                {
                    field: 'updatedAt',
                    title: ''
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.accommodationId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.accommodationId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
