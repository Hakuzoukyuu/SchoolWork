<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('家庭信息列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>关联学生ID：</label>
                                <input type="text" name="studentId"/>
                            </li>
                            <li>
                                <label>家长姓名：</label>
                                <input type="text" name="parentName"/>
                            </li>
                            <li>
                                <label>与学生关系：</label>
                                <input type="text" name="parentRelation"/>
                            </li>
                            <li>
                                <label>家长职业：</label>
                                <input type="text" name="parentJob"/>
                            </li>
                            <li>
                                <label>家庭住址：</label>
                                <input type="text" name="familyAddress"/>
                            </li>
                            <li>
                                <label>家庭经济情况：</label>
                                <input type="text" name="familyIncome"/>
                            </li>
                            <li>
                                <label>家庭固定电话：</label>
                                <input type="text" name="familyPhone"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:family:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:family:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:family:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:family:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:family:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:family:remove')}]];
        var prefix = ctx + "system/family";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "家庭信息",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'familyId',
                    title: '家庭主键',
                    visible: false
                },
                {
                    field: 'studentId',
                    title: '关联学生ID'
                },
                {
                    field: 'parentName',
                    title: '家长姓名'
                },
                {
                    field: 'parentRelation',
                    title: '与学生关系'
                },
                {
                    field: 'parentJob',
                    title: '家长职业'
                },
                {
                    field: 'familyAddress',
                    title: '家庭住址'
                },
                {
                    field: 'familyIncome',
                    title: '家庭经济情况'
                },
                {
                    field: 'familyPhone',
                    title: '家庭固定电话'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.familyId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.familyId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
