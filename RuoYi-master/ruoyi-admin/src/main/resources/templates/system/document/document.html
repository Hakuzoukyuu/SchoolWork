<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('公文流转列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>公文标题：</label>
                                <input type="text" name="docTitle"/>
                            </li>
                            <li>
                                <label>公文文号：</label>
                                <input type="text" name="docNo"/>
                            </li>
                            <li>
                                <label>公文附件：</label>
                                <input type="text" name="fileUrl"/>
                            </li>
                            <li>
                                <label>发文单位/人：</label>
                                <input type="text" name="sender"/>
                            </li>
                            <li>
                                <label>收文单位/人：</label>
                                <input type="text" name="receiver"/>
                            </li>
                            <li>
                                <label>当前审批人：</label>
                                <input type="text" name="currentApprover"/>
                            </li>
                            <li>
                                <label>归档时间：</label>
                                <input type="text" class="time-input" placeholder="请选择归档时间" name="archiveTime"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:document:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:document:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:document:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:document:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:document:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:document:remove')}]];
        var prefix = ctx + "system/document";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "公文流转",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'docId',
                    title: '公文ID',
                    visible: false
                },
                {
                    field: 'docTitle',
                    title: '公文标题'
                },
                {
                    field: 'docNo',
                    title: '公文文号'
                },
                {
                    field: 'docType',
                    title: '公文类型：发文/收文'
                },
                {
                    field: 'docContent',
                    title: '公文内容'
                },
                {
                    field: 'fileUrl',
                    title: '公文附件'
                },
                {
                    field: 'sender',
                    title: '发文单位/人'
                },
                {
                    field: 'receiver',
                    title: '收文单位/人'
                },
                {
                    field: 'flowStatus',
                    title: '流程状态：拟稿/审批中/已签发/已归档'
                },
                {
                    field: 'currentApprover',
                    title: '当前审批人'
                },
                {
                    field: 'approveHistory',
                    title: '审批历史记录'
                },
                {
                    field: 'archiveTime',
                    title: '归档时间'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.docId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.docId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
