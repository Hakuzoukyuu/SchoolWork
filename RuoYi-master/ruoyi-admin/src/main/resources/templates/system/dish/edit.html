<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改菜品台账子')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-dish-edit" th:object="${canteenDish}">
            <input name="dishId" th:field="*{dishId}" type="hidden">
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">关联档口ID：</label>
                    <div class="col-sm-8">
                        <input name="stallId" th:field="*{stallId}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">菜品名称：</label>
                    <div class="col-sm-8">
                        <input name="dishName" th:field="*{dishName}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">菜品单价：</label>
                    <div class="col-sm-8">
                        <input name="dishPrice" th:field="*{dishPrice}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">菜品分类：素菜/荤菜/汤品：</label>
                    <div class="col-sm-8">
                        <input name="dishCategory" th:field="*{dishCategory}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">当日销量：</label>
                    <div class="col-sm-8">
                        <input name="consumeCount" th:field="*{consumeCount}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">菜品消费总额：</label>
                    <div class="col-sm-8">
                        <input name="consumeTotal" th:field="*{consumeTotal}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">备注：</label>
                    <div class="col-sm-8">
                        <input name="remark" th:field="*{remark}" class="form-control" type="text">
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "system/dish";
        $("#form-dish-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-dish-edit').serialize());
            }
        }
    </script>
</body>
</html>
