<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('教职工基础档案主列表')" />
    <!-- ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>姓名：</label>
                                <input type="text" name="staffName"/>
                            </li>
                            <li>
                                <label>所属部门：</label>
                                <input type="text" name="department"/>
                            </li>
                            <li>
                                <label>职称：</label>
                                <input type="text" name="jobTitle"/>
                            </li>
                            <li>
                                <label>学历：</label>
                                <input type="text" name="education"/>
                            </li>
                            <li>
                                <label>合同开始时间：</label>
                                <input type="text" class="time-input" placeholder="请选择合同开始时间" name="contractStart"/>
                            </li>
                            <li>
                                <label>合同到期时间：</label>
                                <input type="text" class="time-input" placeholder="请选择合同到期时间" name="contractEnd"/>
                            </li>
                            <li>
                                <label>联系电话：</label>
                                <input type="text" name="phone"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:info:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:info:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:info:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:info:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            
            <!-- 可视化区域 -->
            <div class="col-sm-12" style="margin-top: 20px;">
                <div class="ibox float-e-margins">
                    <div class="ibox-title">
                        <h5>数据可视化</h5>
                    </div>
                    <div class="ibox-content">
                        <!-- 图表选择区域 -->
                        <div class="row" style="margin-bottom: 15px;">
                            <div class="col-sm-3">
                                <label class="control-label">图表类型：</label>
                                <select id="chartType" class="form-control">
                                    <option value="pie">饼图</option>
                                    <option value="bar">柱状图</option>
                                </select>
                            </div>
                            <div class="col-sm-3">
                                <label class="control-label">数据类型：</label>
                                <select id="dataType" class="form-control">
                                    <option value="staffType">人员类型</option>
                                    <option value="department">所属部门</option>
                                    <option value="jobTitle">职称</option>
                                    <option value="education">学历</option>
                                    <option value="contractType">合同类型</option>
                                    <option value="staffStatus">在职状态</option>
                                </select>
                            </div>
                            <div class="col-sm-2">
                                <label class="control-label">&nbsp;</label>
                                <button id="generateChartBtn" class="btn btn-primary form-control">生成图表</button>
                            </div>
                        </div>
                        <!-- 图表展示区域 -->
                        <div id="chartContainer" style="height: 400px;"></div>
                    </div>
                </div>
            </div>
            
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:info:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:info:remove')}]];
        var prefix = ctx + "system/info";
        var chart = null;
        // 确保ctx已定义
        if (typeof ctx === 'undefined') {
            ctx = '';
        }

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "教职工基础档案主",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'staffId',
                    title: '教职工编号(唯一主键)',
                    visible: false
                },
                {
                    field: 'staffName',
                    title: '姓名'
                },
                {
                    field: 'staffType',
                    title: '人员类型：教师/行政/后勤'
                },
                {
                    field: 'department',
                    title: '所属部门'
                },
                {
                    field: 'jobTitle',
                    title: '职称'
                },
                {
                    field: 'education',
                    title: '学历'
                },
                {
                    field: 'contractType',
                    title: '合同类型'
                },
                {
                    field: 'contractStart',
                    title: '合同开始时间'
                },
                {
                    field: 'contractEnd',
                    title: '合同到期时间'
                },
                {
                    field: 'phone',
                    title: '联系电话'
                },
                {
                    field: 'staffStatus',
                    title: '在职状态：在岗/借调/离职/退休'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.staffId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.staffId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
            
            // 延迟初始化图表，确保DOM已加载完成
            setTimeout(function() {
                initChart();
            }, 500);
            
            // 添加按钮点击事件监听
            $('#generateChartBtn').click(function() {
                console.log('按钮被点击');
                loadChart();
            });
        });
        
        /**
         * 初始化图表
         */
        function initChart() {
            var chartContainer = document.getElementById('chartContainer');
            if (chartContainer) {
                chart = echarts.init(chartContainer);
                // 初始加载人员类型饼图
                loadChart();
            } else {
                console.error('图表容器未找到');
            }
        }
        
        /**
         * 加载图表
         */
        function loadChart() {
            console.log('loadChart函数被调用');
            
            if (!chart) {
                initChart();
                if (!chart) {
                    console.error('图表初始化失败');
                    return;
                }
            }
            
            var chartType = $('#chartType').val();
            var dataType = $('#dataType').val();
            
            console.log('图表类型: ' + chartType);
            console.log('数据类型: ' + dataType);
            
            var url = ctx + "visual/staff/chart";
            console.log('请求URL: ' + url);
            
            $.ajax({
                url: url,
                type: "GET",
                data: {
                    chartType: chartType,
                    dataType: dataType
                },
                timeout: 10000,
                beforeSend: function() {
                    console.log('正在发送请求...');
                },
                success: function(res) {
                    console.log('响应数据:', res);
                    if (res && res.code === 0 && res.data && res.data.success) {
                        renderChart(res.data);
                    } else {
                        // 显示错误信息
                        chart.clear();
                        var errorMsg = res && res.msg ? res.msg : '数据不足，无法绘制图像';
                        console.log('错误信息:', errorMsg);
                        chart.setOption({
                            title: {
                                text: errorMsg,
                                left: 'center',
                                top: 'middle',
                                textStyle: {
                                    color: '#ff0000',
                                    fontSize: 16
                                }
                            }
                        });
                    }
                },
                error: function(xhr, status, error) {
                    console.error('AJAX请求失败:');
                    console.error('状态:', status);
                    console.error('错误:', error);
                    console.error('响应状态码:', xhr.status);
                    console.error('响应文本:', xhr.responseText);
                    if (chart) {
                        chart.clear();
                        var errorMsg = '加载图表失败: ' + (xhr.status === 404 ? '接口未找到' : 
                                                           xhr.status === 500 ? '服务器错误' : 
                                                           xhr.status === 0 ? '网络错误' : '未知错误');
                        chart.setOption({
                            title: {
                                text: errorMsg,
                                left: 'center',
                                top: 'middle',
                                textStyle: {
                                    color: '#ff0000',
                                    fontSize: 16
                                }
                            }
                        });
                    }
                },
                complete: function() {
                    console.log('请求完成');
                }
            });
        }
        
        /**
         * 渲染图表
         */
        function renderChart(data) {
            if (!chart || !data) return;
            
            var chartType = data.chartType;
            var dataTypeName = data.dataTypeName;
            
            console.log('渲染图表: ', data);
            
            if (chartType === 'pie') {
                // 饼图
                chart.setOption({
                    title: {
                        text: dataTypeName + '分布',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'item',
                        formatter: '{b}: {c} ({d}%)'
                    },
                    legend: {
                        orient: 'vertical',
                        left: 'left',
                        data: data.labels || []
                    },
                    series: [{
                        name: dataTypeName,
                        type: 'pie',
                        radius: '55%',
                        center: ['50%', '60%'],
                        data: data.series || [],
                        emphasis: {
                            itemStyle: {
                                shadowBlur: 10,
                                shadowOffsetX: 0,
                                shadowColor: 'rgba(0, 0, 0, 0.5)'
                            }
                        }
                    }]
                });
            } else if (chartType === 'bar') {
                // 柱状图
                chart.setOption({
                    title: {
                        text: dataTypeName + '统计',
                        left: 'center'
                    },
                    tooltip: {
                        trigger: 'axis',
                        axisPointer: {
                            type: 'shadow'
                        }
                    },
                    grid: {
                        left: '3%',
                        right: '4%',
                        bottom: '3%',
                        containLabel: true
                    },
                    xAxis: {
                        type: 'category',
                        data: data.labels || []
                    },
                    yAxis: {
                        type: 'value',
                        name: '人数'
                    },
                    series: [{
                        name: dataTypeName,
                        type: 'bar',
                        data: data.values || [],
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: '#83bff6'},
                                {offset: 0.5, color: '#188df0'},
                                {offset: 1, color: '#188df0'}
                            ]),
                            borderRadius: [4, 4, 0, 0]
                        }
                    }]
                });
            }
        }
    </script>
</body>
</html>
