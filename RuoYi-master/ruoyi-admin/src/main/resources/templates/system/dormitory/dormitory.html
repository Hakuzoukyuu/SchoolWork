<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('宿舍信息主列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>楼栋名称：</label>
                                <input type="text" name="buildingName"/>
                            </li>
                            <li>
                                <label>宿舍编号：</label>
                                <input type="text" name="dormNo"/>
                            </li>
                            <li>
                                <label>楼层：</label>
                                <input type="text" name="floorNum"/>
                            </li>
                            <li>
                                <label>最大床位数量：</label>
                                <input type="text" name="maxBed"/>
                            </li>
                            <li>
                                <label>宿舍整体卫生评级：</label>
                                <input type="text" name="dormHygiene"/>
                            </li>
                            <li>
                                <label>宿舍管理员：</label>
                                <input type="text" name="managerName"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:dormitory:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:dormitory:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:dormitory:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:dormitory:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:dormitory:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:dormitory:remove')}]];
        var prefix = ctx + "system/dormitory";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "宿舍信息主",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'dormId',
                    title: '宿舍主键ID',
                    visible: false
                },
                {
                    field: 'buildingName',
                    title: '楼栋名称'
                },
                {
                    field: 'dormNo',
                    title: '宿舍编号'
                },
                {
                    field: 'floorNum',
                    title: '楼层'
                },
                {
                    field: 'maxBed',
                    title: '最大床位数量'
                },
                {
                    field: 'dormType',
                    title: '宿舍类型'
                },
                {
                    field: 'dormHygiene',
                    title: '宿舍整体卫生评级'
                },
                {
                    field: 'dormCheckStatus',
                    title: '宿舍整体查寝状态'
                },
                {
                    field: 'managerName',
                    title: '宿舍管理员'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.dormId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.dormId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
