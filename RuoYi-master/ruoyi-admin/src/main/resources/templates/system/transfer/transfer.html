<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('教职工调动管理列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>教职工编号：</label>
                                <input type="text" name="staffId"/>
                            </li>
                            <li>
                                <label>原部门：</label>
                                <input type="text" name="oldDepartment"/>
                            </li>
                            <li>
                                <label>新部门：</label>
                                <input type="text" name="newDepartment"/>
                            </li>
                            <li>
                                <label>异动时间：</label>
                                <input type="text" class="time-input" placeholder="请选择异动时间" name="transferTime"/>
                            </li>
                            <li>
                                <label>备注：</label>
                                <input type="text" name="transferRemark"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:transfer:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:transfer:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:transfer:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:transfer:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:transfer:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:transfer:remove')}]];
        var prefix = ctx + "system/transfer";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "教职工调动管理",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'transferId',
                    title: '异动记录ID',
                    visible: false
                },
                {
                    field: 'staffId',
                    title: '教职工编号'
                },
                {
                    field: 'transferType',
                    title: '异动类型：入职/调岗/借调/离职/退休'
                },
                {
                    field: 'oldDepartment',
                    title: '原部门'
                },
                {
                    field: 'newDepartment',
                    title: '新部门'
                },
                {
                    field: 'transferTime',
                    title: '异动时间'
                },
                {
                    field: 'transferRemark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.transferId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.transferId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
