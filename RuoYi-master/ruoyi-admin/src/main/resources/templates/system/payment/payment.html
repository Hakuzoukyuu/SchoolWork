<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('学生缴费列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>学生姓名：</label>
                                <input type="text" name="studentName"/>
                            </li>
                            <li>
                                <label>所属专业：</label>
                                <input type="text" name="major"/>
                            </li>
                            <li>
                                <label>学费：</label>
                                <input type="text" name="tuitionFee"/>
                            </li>
                            <li>
                                <label>住宿费：</label>
                                <input type="text" name="dormFee"/>
                            </li>
                            <li>
                                <label>杂费：</label>
                                <input type="text" name="otherFee"/>
                            </li>
                            <li>
                                <label>代管费：</label>
                                <input type="text" name="managedFee"/>
                            </li>
                            <li>
                                <label>应缴总金额：</label>
                                <input type="text" name="totalFee"/>
                            </li>
                            <li>
                                <label>已缴金额：</label>
                                <input type="text" name="paidFee"/>
                            </li>
                            <li>
                                <label>欠费金额：</label>
                                <input type="text" name="unpaidFee"/>
                            </li>
                            <li>
                                <label>缴费时间：</label>
                                <input type="text" class="time-input" placeholder="请选择缴费时间" name="payTime"/>
                            </li>
                            <li>
                                <label>缴费订单号：</label>
                                <input type="text" name="payOrderNo"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:payment:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:payment:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:payment:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:payment:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:payment:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:payment:remove')}]];
        var prefix = ctx + "system/payment";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "学生缴费",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'studentId',
                    title: '学生编号',
                    visible: false
                },
                {
                    field: 'studentName',
                    title: '学生姓名'
                },
                {
                    field: 'major',
                    title: '所属专业'
                },
                {
                    field: 'tuitionFee',
                    title: '学费'
                },
                {
                    field: 'dormFee',
                    title: '住宿费'
                },
                {
                    field: 'otherFee',
                    title: '杂费'
                },
                {
                    field: 'managedFee',
                    title: '代管费'
                },
                {
                    field: 'totalFee',
                    title: '应缴总金额'
                },
                {
                    field: 'paidFee',
                    title: '已缴金额'
                },
                {
                    field: 'unpaidFee',
                    title: '欠费金额'
                },
                {
                    field: 'payType',
                    title: '缴费方式：线上/线下'
                },
                {
                    field: 'payStatus',
                    title: '缴费状态'
                },
                {
                    field: 'payTime',
                    title: '缴费时间'
                },
                {
                    field: 'payOrderNo',
                    title: '缴费订单号'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.studentId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.studentId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
