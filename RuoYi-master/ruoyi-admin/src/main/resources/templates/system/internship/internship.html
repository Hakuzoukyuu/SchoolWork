<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('企业实习(子)列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>学生编号：</label>
                                <input type="text" name="studentId"/>
                            </li>
                            <li>
                                <label>学生姓名：</label>
                                <input type="text" name="studentName"/>
                            </li>
                            <li>
                                <label>所属专业：</label>
                                <input type="text" name="major"/>
                            </li>
                            <li>
                                <label>企业编号：</label>
                                <input type="text" name="companyId"/>
                            </li>
                            <li>
                                <label>实习岗位：</label>
                                <input type="text" name="internshipPost"/>
                            </li>
                            <li>
                                <label>实习开始时间：</label>
                                <input type="text" class="time-input" placeholder="请选择实习开始时间" name="internshipStart"/>
                            </li>
                            <li>
                                <label>实习结束时间：</label>
                                <input type="text" class="time-input" placeholder="请选择实习结束时间" name="internshipEnd"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:internship:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:internship:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:internship:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:internship:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:internship:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:internship:remove')}]];
        var prefix = ctx + "system/internship";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "企业实习(子)",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'internshipId',
                    title: '实习编号',
                    visible: false
                },
                {
                    field: 'studentId',
                    title: '学生编号'
                },
                {
                    field: 'studentName',
                    title: '学生姓名'
                },
                {
                    field: 'studentType',
                    title: '学生类型：本科生/研究生'
                },
                {
                    field: 'major',
                    title: '所属专业'
                },
                {
                    field: 'companyId',
                    title: '企业编号'
                },
                {
                    field: 'internshipPost',
                    title: '实习岗位'
                },
                {
                    field: 'internshipStart',
                    title: '实习开始时间'
                },
                {
                    field: 'internshipEnd',
                    title: '实习结束时间'
                },
                {
                    field: 'internshipStatus',
                    title: '实习状态'
                },
                {
                    field: 'reportStatus',
                    title: '实习报备状态'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.internshipId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.internshipId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
