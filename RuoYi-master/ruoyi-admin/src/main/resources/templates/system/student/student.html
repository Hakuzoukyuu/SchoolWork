<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('学生列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>学号：</label>
                                <input type="text" name="studentNo"/>
                            </li>
                            <li>
                                <label>学生姓名：</label>
                                <input type="text" name="studentName"/>
                            </li>
                            <li>
                                <label>性别：</label>
                                <input type="text" name="gender"/>
                            </li>
                            <li>
                                <label>出生日期：</label>
                                <input type="text" class="time-input" placeholder="请选择出生日期" name="birthDate"/>
                            </li>
                            <li>
                                <label>身份证号：</label>
                                <input type="text" name="idCard"/>
                            </li>
                            <li>
                                <label>民族：</label>
                                <input type="text" name="ethnic"/>
                            </li>
                            <li>
                                <label>政治面貌：</label>
                                <input type="text" name="political"/>
                            </li>
                            <li>
                                <label>身高(cm)：</label>
                                <input type="text" name="height"/>
                            </li>
                            <li>
                                <label>体重(kg)：</label>
                                <input type="text" name="weight"/>
                            </li>
                            <li>
                                <label>学生手机号：</label>
                                <input type="text" name="phone"/>
                            </li>
                            <li>
                                <label>家长/监护人手机号：</label>
                                <input type="text" name="parentPhone"/>
                            </li>
                            <li>
                                <label>邮箱：</label>
                                <input type="text" name="email"/>
                            </li>
                            <li>
                                <label>微信号：</label>
                                <input type="text" name="wechat"/>
                            </li>
                            <li>
                                <label>QQ号：</label>
                                <input type="text" name="qq"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:student:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:student:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:student:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:student:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:student:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:student:remove')}]];
        var prefix = ctx + "system/student";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "学生",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'studentId',
                    title: '学生主键ID',
                    visible: false
                },
                {
                    field: 'studentNo',
                    title: '学号'
                },
                {
                    field: 'studentName',
                    title: '学生姓名'
                },
                {
                    field: 'gender',
                    title: '性别'
                },
                {
                    field: 'birthDate',
                    title: '出生日期'
                },
                {
                    field: 'idCard',
                    title: '身份证号'
                },
                {
                    field: 'ethnic',
                    title: '民族'
                },
                {
                    field: 'political',
                    title: '政治面貌'
                },
                {
                    field: 'bloodType',
                    title: '血型'
                },
                {
                    field: 'height',
                    title: '身高(cm)'
                },
                {
                    field: 'weight',
                    title: '体重(kg)'
                },
                {
                    field: 'phone',
                    title: '学生手机号'
                },
                {
                    field: 'parentPhone',
                    title: '家长/监护人手机号'
                },
                {
                    field: 'email',
                    title: '邮箱'
                },
                {
                    field: 'wechat',
                    title: '微信号'
                },
                {
                    field: 'qq',
                    title: 'QQ号'
                },
                {
                    field: 'remark',
                    title: '备注信息'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.studentId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.studentId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
