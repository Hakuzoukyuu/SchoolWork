<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('财务审批列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>审批标题/台账名称：</label>
                                <input type="text" name="approvalTitle"/>
                            </li>
                            <li>
                                <label>申请人：</label>
                                <input type="text" name="applyUser"/>
                            </li>
                            <li>
                                <label>申请部门：</label>
                                <input type="text" name="applyDept"/>
                            </li>
                            <li>
                                <label>申请金额：</label>
                                <input type="text" name="feeAmount"/>
                            </li>
                            <li>
                                <label>审批人：</label>
                                <input type="text" name="approvalUser"/>
                            </li>
                            <li>
                                <label>审批时间：</label>
                                <input type="text" class="time-input" placeholder="请选择审批时间" name="approvalTime"/>
                            </li>
                            <li>
                                <label>财务台账记录：</label>
                                <input type="text" name="accountRecord"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:approval:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:approval:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:approval:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:approval:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:approval:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:approval:remove')}]];
        var prefix = ctx + "system/approval";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "财务审批",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'financialId',
                    title: '财务审批ID',
                    visible: false
                },
                {
                    field: 'approvalType',
                    title: '审批类型：费用报销/物资采购'
                },
                {
                    field: 'approvalTitle',
                    title: '审批标题/台账名称'
                },
                {
                    field: 'applyUser',
                    title: '申请人'
                },
                {
                    field: 'applyDept',
                    title: '申请部门'
                },
                {
                    field: 'feeAmount',
                    title: '申请金额'
                },
                {
                    field: 'approvalStatus',
                    title: '审批状态：待审批/已通过/已驳回'
                },
                {
                    field: 'approvalUser',
                    title: '审批人'
                },
                {
                    field: 'approvalTime',
                    title: '审批时间'
                },
                {
                    field: 'accountRecord',
                    title: '财务台账记录'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.financialId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.financialId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
