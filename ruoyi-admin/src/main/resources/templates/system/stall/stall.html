<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('食堂档口主列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>档口编号：</label>
                                <input type="text" name="stallNo"/>
                            </li>
                            <li>
                                <label>档口名称：</label>
                                <input type="text" name="stallName"/>
                            </li>
                            <li>
                                <label>所属食堂：</label>
                                <input type="text" name="canteenName"/>
                            </li>
                            <li>
                                <label>档口负责人：</label>
                                <input type="text" name="manager"/>
                            </li>
                            <li>
                                <label>检查人：</label>
                                <input type="text" name="checkPeople"/>
                            </li>
                            <li>
                                <label>检查时间：</label>
                                <input type="text" class="time-input" placeholder="请选择检查时间" name="checkTime"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:stall:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:stall:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:stall:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:stall:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:stall:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:stall:remove')}]];
        var prefix = ctx + "system/stall";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "食堂档口主",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'stallId',
                    title: '档口主键ID',
                    visible: false
                },
                {
                    field: 'stallNo',
                    title: '档口编号'
                },
                {
                    field: 'stallName',
                    title: '档口名称'
                },
                {
                    field: 'canteenName',
                    title: '所属食堂'
                },
                {
                    field: 'manager',
                    title: '档口负责人'
                },
                {
                    field: 'hygieneStatus',
                    title: '卫生检查结果：合格/不合格'
                },
                {
                    field: 'checkPeople',
                    title: '检查人'
                },
                {
                    field: 'checkTime',
                    title: '检查时间'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.stallId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.stallId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
