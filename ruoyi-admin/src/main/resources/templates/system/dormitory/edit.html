<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改宿舍信息主')" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-dormitory-edit" th:object="${dormDormitory}">
            <h4 class="form-header h4">宿舍信息主信息</h4>
            <input name="dormId" th:field="*{dormId}" type="hidden">
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">楼栋名称：</label>
                    <div class="col-sm-8">
                        <input name="buildingName" th:field="*{buildingName}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">宿舍编号：</label>
                    <div class="col-sm-8">
                        <input name="dormNo" th:field="*{dormNo}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">楼层：</label>
                    <div class="col-sm-8">
                        <input name="floorNum" th:field="*{floorNum}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">最大床位数量：</label>
                    <div class="col-sm-8">
                        <input name="maxBed" th:field="*{maxBed}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label is-required">宿舍整体卫生评级：</label>
                    <div class="col-sm-8">
                        <input name="dormHygiene" th:field="*{dormHygiene}" class="form-control" type="text" required>
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">宿舍管理员：</label>
                    <div class="col-sm-8">
                        <input name="managerName" th:field="*{managerName}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <div class="col-xs-12">
                <div class="form-group">
                    <label class="col-sm-3 control-label">备注：</label>
                    <div class="col-sm-8">
                        <input name="remark" th:field="*{remark}" class="form-control" type="text">
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">床位与学生入住子信息</h4>
            <div class="row">
                <div class="col-sm-12">
                    <button type="button" class="btn btn-white btn-sm" onclick="addRow()"><i class="fa fa-plus"> 增加</i></button>
                    <button type="button" class="btn btn-white btn-sm" onclick="sub.delRow()"><i class="fa fa-minus"> 删除</i></button>
                    <div class="col-sm-12 select-table table-striped">
                        <table id="bootstrap-table"></table>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var prefix = ctx + "system/dormitory";
        $("#form-dormitory-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-dormitory-edit').serialize());
            }
        }

        $(function() {
            var options = {
                data: [[${dormDormitory.dormBedList}]],
                pagination: false,
                showSearch: false,
                showRefresh: false,
                showToggle: false,
                showColumns: false,
                sidePagination: "client",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'index',
                    align: 'center',
                    title: "序号",
                    formatter: function (value, row, index) {
                    	var columnIndex = $.common.sprintf("<input type='hidden' name='index' value='%s'>", $.table.serialNumber(index));
                    	return columnIndex + $.table.serialNumber(index);
                    }
                },
                {
                    field: 'bedNo',
                    align: 'center',
                    title: '床位编号',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].bedNo' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'studentId',
                    align: 'center',
                    title: '学生学号',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].studentId' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'studentName',
                    align: 'center',
                    title: '学生姓名',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].studentName' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'bedStatus',
                    align: 'center',
                    title: '床位状态：空置/已入住/休学',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].bedStatus' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'dailyHygiene',
                    align: 'center',
                    title: '个人卫生情况',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].dailyHygiene' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'nightCheck',
                    align: 'center',
                    title: '晚查寝状态',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].nightCheck' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'checkTime',
                    align: 'center',
                    title: '查寝时间',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].checkTime' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'remark',
                    align: 'center',
                    title: '备注',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].remark' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'createTime',
                    align: 'center',
                    title: '',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].createTime' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    field: 'updateTime',
                    align: 'center',
                    title: '',
                    formatter: function(value, row, index) {
                        var html = $.common.sprintf("<input class='form-control' type='text' name='dormBedList[%s].updateTime' value='%s'>", index, value);
                        return html;
                    }
                },

                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var value = $.common.isNotEmpty(row.index) ? row.index : $.table.serialNumber(index);
                        return '<a class="btn btn-danger btn-xs" href="javascript:void(0)" onclick="sub.delRowByIndex(\'' + value + '\')"><i class="fa fa-remove"></i>删除</a>';
                    }
                }]
            };
            $.table.init(options);
        });

        function addRow() {
            var count = $("#" + table.options.id).bootstrapTable('getData').length;
            var row = {
                index: $.table.serialNumber(count),
                bedNo: "",
                studentId: "",
                studentName: "",
                bedStatus: "",
                dailyHygiene: "",
                nightCheck: "",
                checkTime: "",
                remark: "",
                createTime: "",
                updateTime: "",
            }
            sub.addRow(row);
        }
    </script>
</body>
</html>
