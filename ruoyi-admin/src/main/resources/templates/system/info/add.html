<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('新增教职工基础档案主')" />
    <th:block th:include="include :: datetimepicker-css" />
</head>
<body class="white-bg">
<div class="wrapper wrapper-content animated fadeInRight ibox-content">
    <form class="form-horizontal m" id="form-info-add">
        <!-- 主键：教职工编号 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">教职工编号：</label>
                <div class="col-sm-8">
                    <input name="staffId" class="form-control" type="text" placeholder="请输入唯一教职工编号" required>
                </div>
            </div>
        </div>
        <!-- 人员类型（数据库非空字段） -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">人员类型：</label>
                <div class="col-sm-8">
                    <select name="staffType" class="form-control" required>
                        <option value="教师">教师</option>
                        <option value="行政">行政</option>
                        <option value="后勤">后勤</option>
                    </select>
                </div>
            </div>
        </div>
        <!-- 姓名 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">姓名：</label>
                <div class="col-sm-8">
                    <input name="staffName" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <!-- 所属部门 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">所属部门：</label>
                <div class="col-sm-8">
                    <input name="department" class="form-control" type="text" required>
                </div>
            </div>
        </div>
        <!-- 职称 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">职称：</label>
                <div class="col-sm-8">
                    <input name="jobTitle" class="form-control" type="text">
                </div>
            </div>
        </div>
        <!-- 学历 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">学历：</label>
                <div class="col-sm-8">
                    <input name="education" class="form-control" type="text">
                </div>
            </div>
        </div>
        <!-- 合同类型 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">合同类型：</label>
                <div class="col-sm-8">
                    <select name="contractType" class="form-control">
                        <option value="正式合同">正式合同</option>
                        <option value="临时合同">临时合同</option>
                        <option value="实习合同">实习合同</option>
                    </select>
                </div>
            </div>
        </div>
        <!-- 合同开始时间 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">合同开始时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="contractStart" class="form-control" placeholder="yyyy-MM-dd" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 合同到期时间 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">合同到期时间：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="contractEnd" class="form-control" placeholder="yyyy-MM-dd" type="text">
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
        </div>
        <!-- 联系电话 -->
        <div class="col-xs-12">
            <div class="form-group">
                <label class="col-sm-3 control-label">联系电话：</label>
                <div class="col-sm-8">
                    <input name="phone" class="form-control" type="text">
                </div>
            </div>
        </div>
        <!-- 在职状态（隐藏，默认在岗） -->
        <input name="staffStatus" type="hidden" value="在岗">
    </form>
</div>
<th:block th:include="include :: footer" />
<th:block th:include="include :: datetimepicker-js" />
<script th:inline="javascript">
    var prefix = ctx + "system/info"
    $("#form-info-add").validate({
        focusCleanup: true
    });

    function submitHandler() {
        if ($.validate.form()) {
            $.operate.save(prefix + "/add", $('#form-info-add').serialize());
        }
    }

    $("input[name='contractStart']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });

    $("input[name='contractEnd']").datetimepicker({
        format: "yyyy-mm-dd",
        minView: "month",
        autoclose: true
    });
</script>
</body>
</html>
