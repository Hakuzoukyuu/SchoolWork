<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('学生德育考核管理列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>学生姓名：</label>
                                <input type="text" name="studentName"/>
                            </li>
                            <li>
                                <label>所属班级ID：</label>
                                <input type="text" name="classId"/>
                            </li>
                            <li>
                                <label>班级名称：</label>
                                <input type="text" name="className"/>
                            </li>
                            <li>
                                <label>日常行为评分：</label>
                                <input type="text" name="dailyScore"/>
                            </li>
                            <li>
                                <label>文明校园考核分：</label>
                                <input type="text" name="campusScore"/>
                            </li>
                            <li>
                                <label>德育总分：</label>
                                <input type="text" name="totalScore"/>
                            </li>
                            <li>
                                <label>考核日期：</label>
                                <input type="text" class="time-input" placeholder="请选择考核日期" name="examTime"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:moral:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:moral:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:moral:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:moral:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:moral:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:moral:remove')}]];
        var prefix = ctx + "system/moral";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "学生德育考核管理",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'studentId',
                    title: '学生id',
                    visible: false
                },
                {
                    field: 'studentName',
                    title: '学生姓名'
                },
                {
                    field: 'classId',
                    title: '所属班级ID'
                },
                {
                    field: 'className',
                    title: '班级名称'
                },
                {
                    field: 'dailyScore',
                    title: '日常行为评分'
                },
                {
                    field: 'campusScore',
                    title: '文明校园考核分'
                },
                {
                    field: 'totalScore',
                    title: '德育总分'
                },
                {
                    field: 'examStatus',
                    title: '考核状态(合格/不合格)'
                },
                {
                    field: 'examTime',
                    title: '考核日期'
                },
                {
                    field: 'remark',
                    title: '备注'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.studentId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.studentId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
