<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('绩效考核管理列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>教职工编号：</label>
                                <input type="text" name="staffId"/>
                            </li>
                            <li>
                                <label>考核学期/年度：</label>
                                <input type="text" name="assessTerm"/>
                            </li>
                            <li>
                                <label>综合评分：</label>
                                <input type="text" name="scoreTotal"/>
                            </li>
                            <li>
                                <label>考核结果：优秀/合格/不合格：</label>
                                <input type="text" name="assessResult"/>
                            </li>
                            <li>
                                <label>考核时间：</label>
                                <input type="text" class="time-input" placeholder="请选择考核时间" name="assessTime"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:performance:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:performance:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:performance:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:performance:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:performance:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:performance:remove')}]];
        var prefix = ctx + "system/performance";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "绩效考核管理",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'perfId',
                    title: '绩效ID',
                    visible: false
                },
                {
                    field: 'staffId',
                    title: '教职工编号'
                },
                {
                    field: 'assessType',
                    title: '考核类型：教学考核/行政考核'
                },
                {
                    field: 'assessTerm',
                    title: '考核学期/年度'
                },
                {
                    field: 'scoreTotal',
                    title: '综合评分'
                },
                {
                    field: 'assessResult',
                    title: '考核结果：优秀/合格/不合格'
                },
                {
                    field: 'assessTime',
                    title: '考核时间'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.perfId + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.perfId + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>
